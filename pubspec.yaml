name: asroo
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1
environment:
  sdk: ">=3.2.4 <4.0.0"

dependencies:
  animate_do: ^3.3.2
  badges: ^3.1.2
  bloc_concurrency: ^0.2.4
  cached_network_image: ^3.3.1
  carousel_slider: ^5.0.0
  cloud_firestore: ^5.5.1
  connectivity_plus: ^5.0.2 #because there is an error with the newest ver
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  equatable: ^2.0.5
  firebase_core: ^3.8.1
  firebase_dynamic_links: ^6.0.11
  firebase_messaging: ^15.1.6
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_bloc: ^8.1.3
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.3.10
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9
  flutter_zoom_drawer: ^3.1.2
  fluttertoast: ^8.2.4
  freezed_annotation: ^2.4.1
  get_it: ^8.0.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  package_info_plus: ^8.1.2
  permission_handler: ^11.2.0
  pretty_dio_logger: ^1.3.1
  retrofit: ^4.0.3
  share_plus: ^10.1.3
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  webview_flutter: ^4.7.0

dev_dependencies:
  # dart run build_runner build --delete-conflicting-outputs
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.2
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.4.6
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  retrofit_generator: ^9.1.5
  very_good_analysis: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.jpg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/play_store_512.png"

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    - lang/ar.json
    - lang/en.json
    - assets/images/core/
    - assets/images/admin/
    - assets/images/customer/
    - assets/svg/

  fonts:
    # Arabic Font
    - family: Cairo
      fonts:
        - asset: assets/fonts/arabic/cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/arabic/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/arabic/cairo/Cairo-Regular.ttf
          weight: 400
    # English Font
    - family: Poppins
      fonts:
        - asset: assets/fonts/english/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/english/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/english/poppins/Poppins-Regular.ttf
          weight: 400
